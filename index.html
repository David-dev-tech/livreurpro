<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LivreurPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,700;0,900;1,900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --anthracite:  #1C1F24;
      --anthracite2: #252930;
      --anthracite3: #2F343C;
      --cyan:        #00D4E8;
      --cyan-dim:    rgba(0,212,232,0.10);
      --cyan-border: rgba(0,212,232,0.22);
      --white:       #F2F4F7;
      --grey:        #6B7280;
      --grey-light:  #9CA3AF;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--anthracite);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
    }

    /* ── LAYOUT ── */
    .split {
      display: grid;
      grid-template-columns: 65fr 35fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ══════════════════════════════
       LEFT PANEL (65%)
    ══════════════════════════════ */
    .left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.8rem 3.5rem;
      background: var(--anthracite);
      overflow: hidden;
      z-index: 1;
    }


    /* ── NAV ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--white);
    }
    .logo-dot { color: var(--cyan); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-light);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--cyan); }

    /* ── MAIN TEXT ── */
    .main-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1rem 0;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .eyebrow-line {
      width: 40px; height: 1.5px;
      background: var(--cyan);
    }
    .eyebrow-text {
      font-size: .82rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cyan);
      font-weight: 500;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(4.5rem, 7vw, 7rem);
      line-height: .92;
      letter-spacing: -.01em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 2.2rem;
    }

    h1 .outline {
      -webkit-text-stroke: 2px var(--cyan);
      color: transparent;
    }

    h1 .block { display: block; 
        height: 3vw;
        font-size: 3vw;
    }

    .desc {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--grey-light);
      font-weight: 300;
      max-width: 55vw;
      margin-bottom: 3rem;
      border-left: 2px solid var(--cyan);
      padding-left: 1.2rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn-main {
      background: var(--cyan);
      color: var(--anthracite);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .95rem 2.5rem;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: opacity .2s;
    }
    .btn-main:hover { opacity: .85; }

    .btn-outline {
      background: transparent;
      color: var(--grey-light);
      font-size: .88rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .95rem 1.8rem;
      border: 1px solid var(--anthracite3);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-outline:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── STATS ── */
    .stats {
      display: flex;
      gap: 0;
      position: relative;
      z-index: 2;
    }

    .stat {
      flex: 1;
      padding: 1.2rem 0;
      border-top: 1px solid var(--anthracite3);
      position: relative;
    }
    .stat + .stat {
      margin-left: 1.5rem;
      padding-left: 1.5rem;
    }
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0; top: 1.2rem; bottom: 0;
      width: 1px;
      background: var(--anthracite3);
    }

    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--white);
      letter-spacing: -.02em;
    }
    .stat-num sup {
      font-size: 1rem;
      color: var(--cyan);
      font-weight: 700;
    }
    .stat-label {
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--grey);
      margin-top: .3rem;
    }

    /* ══════════════════════════════
       RIGHT PANEL (35%)
    ══════════════════════════════ */
    .right {
      position: relative;
      overflow: hidden;
      background: var(--anthracite2);
    }

    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(15%) brightness(.85) contrast(1.05);
    }

    a{
        text-decoration: none;
    }

    /* cyan overlay */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(0,212,232,0.15) 0%,
        transparent 45%,
        rgba(28,31,36,0.5) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* vertical label */
    .right-label {
      position: absolute;
      top: 50%;
      right: 1.8rem;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center center;
      z-index: 2;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      white-space: nowrap;
    }

    /* index top-left */
    .panel-index {
      position: absolute;
      top: 2rem;
      left: 1.8rem;
      z-index: 2;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      letter-spacing: .2em;
      color: var(--cyan);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .panel-index::after {
      content: '';
      width: 24px; height: 1px;
      background: var(--cyan);
      opacity: .5;
    }

    /* bracket corner top-right */
    .bracket {
      position: absolute;
      top: 1.6rem;
      right: 1.6rem;
      width: 24px; height: 24px;
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      z-index: 2;
      opacity: .55;
    }

    /* info card */
    .info-card {
      position: absolute;
      bottom: 2rem;
      left: 1.5rem;
      z-index: 2;
      background: rgba(28,31,36,0.9);
      border: 1px solid var(--cyan-border);
      border-left: 3px solid var(--cyan);
      padding: .9rem 1.2rem;
      backdrop-filter: blur(10px);
      max-width: 180px;
    }
    .info-card-label {
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: .4rem;
    }
    .info-card-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--white);
    }
    .info-card-sub {
      font-size: .72rem;
      color: var(--grey-light);
      margin-top: .2rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      html, body { overflow: auto; }
      .split { grid-template-columns: 1fr; height: auto; }
      .right { height: 55vw; min-height: 260px; }
      .left { padding: 2rem; overflow: visible; }
      h1 { font-size: clamp(3.5rem, 13vw, 5.5rem); }
    }
  </style>
</head>

      </nav>

      <div class="main-content">

        <div class="actions">

      </div>

    </div>

    <!-- ═══ RIGHT 35% ═══ -->

      <img src="img/img2.jpg" alt="LivreurPro"/>

  </div>

</body>
